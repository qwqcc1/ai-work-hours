<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI工时管理系统{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Sidebar Toggle (mobile) -->
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle menu">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/></svg>
    </button>
    <!-- Sidebar Backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" style="display:none;">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7"/><polyline points="9,5 9,9 12,9"/></svg>
            </div>
            <span>AI工时管理</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="sidebar-link">
                <span class="sidebar-link-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="7" height="7" rx="1.5"/><rect x="10" y="1" width="7" height="7" rx="1.5"/><rect x="1" y="10" width="7" height="7" rx="1.5"/><rect x="10" y="10" width="7" height="7" rx="1.5"/></svg></span><span>仪表盘</span>
            </a>
            <a href="/summary" class="sidebar-link">
                <span class="sidebar-link-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="9" width="3" height="8" rx="0.5"/><rect x="6" y="5" width="3" height="12" rx="0.5"/><rect x="11" y="2" width="3" height="15" rx="0.5"/></svg></span><span>汇总统计</span>
            </a>
            <div class="sidebar-divider"></div>
            <!-- 工作总结 -->
            <div class="sidebar-section" id="sidebar-section-summary">
                <div class="sidebar-section-header">
                    <span class="sidebar-link-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 1H3.5A1.5 1.5 0 002 2.5v13A1.5 1.5 0 003.5 17h11a1.5 1.5 0 001.5-1.5V5.5L11 1H5z"/><polyline points="11,1 11,5.5 15.5,5.5"/><line x1="5" y1="9" x2="13" y2="9"/><line x1="5" y1="12" x2="13" y2="12"/></svg></span><span>工作总结</span>
                    <span class="sidebar-chevron"><svg width="8" height="6" viewBox="0 0 8 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="1,1 4,4 7,1"/></svg></span>
                </div>
                <div class="sidebar-subitems"><div class="sidebar-subitems-inner">
                    <a href="/entry" class="sidebar-subitem">
                        <span class="sidebar-subitem-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><polyline points="8,4.5 8,8 10.5,8"/></svg></span>
                        <span class="sidebar-subitem-text"><strong>工时表</strong><span>日常工时记录与填报</span></span>
                    </a>
                    <a href="/monthly-summary" class="sidebar-subitem">
                        <span class="sidebar-subitem-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2.5" width="12" height="12" rx="1.5"/><line x1="2" y1="6" x2="14" y2="6"/><line x1="5.5" y1="1.5" x2="5.5" y2="4"/><line x1="10.5" y1="1.5" x2="10.5" y2="4"/></svg></span>
                        <span class="sidebar-subitem-text"><strong>月总结</strong><span>月度工作回顾与复盘</span></span>
                    </a>
                    <a href="/performance" class="sidebar-subitem">
                        <span class="sidebar-subitem-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,11 5,8 8,10 14,3"/><polyline points="11,3 14,3 14,6"/></svg></span>
                        <span class="sidebar-subitem-text"><strong>绩效评价表</strong><span>考核指标与评分</span></span>
                    </a>
                    <a href="/goals" class="sidebar-subitem">
                        <span class="sidebar-subitem-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="5.5"/><circle cx="8" cy="8" r="2.2"/><line x1="8" y1="1" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15"/><line x1="1" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15" y2="8"/></svg></span>
                        <span class="sidebar-subitem-text"><strong>目标设定表</strong><span>目标制定与进度跟踪</span></span>
                    </a>
                </div></div>
            </div>
            <!-- 任务管理 -->
            <a href="/tasks" class="sidebar-link">
                <span class="sidebar-link-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="2.5" width="13" height="13" rx="1.5"/><polyline points="5.5,9 8,11.5 12.5,6.5"/></svg></span><span>查看任务</span>
            </a>
            <a href="/tasks#create" class="sidebar-link">
                <span class="sidebar-link-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7"/><line x1="9" y1="5.5" x2="9" y2="12.5"/><line x1="5.5" y1="9" x2="12.5" y2="9"/></svg></span><span>发布任务</span>
            </a>
            <div class="sidebar-divider"></div>
            <!-- 管理菜单 (admin only) -->
            <a href="/admin#users" class="sidebar-link" id="sidebar-link-users" style="display:none;">
                <span class="sidebar-link-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="5.5" r="3"/><path d="M2.5 16c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg></span><span>用户管理</span>
            </a>
            <a href="/admin#projects" class="sidebar-link" id="sidebar-link-projects" style="display:none;">
                <span class="sidebar-link-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 4.5a1 1 0 011-1h4l1.5 2h5a1 1 0 011 1v7a1 1 0 01-1 1h-11a1 1 0 01-1-1v-9z"/></svg></span><span>项目管理</span>
            </a>
        </nav>
        <!-- User section -->
        <div class="sidebar-user" id="sidebar-user">
            <div class="sidebar-user-avatar" id="sidebar-user-avatar"></div>
            <div>
                <div class="sidebar-user-name" id="sidebar-user-name"></div>
                <div class="sidebar-user-role" id="sidebar-user-role"></div>
            </div>
            <span class="sidebar-chevron"><svg width="8" height="6" viewBox="0 0 8 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="1,1 4,4 7,1"/></svg></span>
            <div class="sidebar-user-dropdown" id="sidebar-user-dropdown">
                <a href="#" onclick="openSettings()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="2.5"/><path d="M7 1.5v1.2M7 11.3v1.2M1.5 7h1.2M11.3 7h1.2M3.1 3.1l.9.9M10 10l.9.9M3.1 10.9l.9-.9M10 4l.9-.9"/></svg> 设置</a>
                <a href="#" onclick="toggleTheme()"><span id="theme-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="7" cy="7" r="3.5"/><line x1="7" y1="1" x2="7" y2="2"/><line x1="7" y1="12" x2="7" y2="13"/><line x1="1" y1="7" x2="2" y2="7"/><line x1="12" y1="7" x2="13" y2="7"/></svg></span> 切换主题</a>
                <a href="#" onclick="logout()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 2H2.5a1 1 0 00-1 1v8a1 1 0 001 1h3"/><polyline points="9.5,10 13,7 9.5,4"/><line x1="13" y1="7" x2="5" y2="7"/></svg> 退出</a>
            </div>
        </div>
    </aside>
    <div class="toast-container" id="toast-container"></div>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/app.js"></script>
    {% block extra_script %}{% endblock %}
</body>
</html>
