{% extends "base.html" %}
{% block title %}登录 - AI工时管理系统{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="url(#apple-gradient)"/>
            <circle cx="24" cy="24" r="12.5" stroke="white" stroke-width="1.8" fill="none"/>
            <polyline points="24,14 24,24 31,24" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
                <linearGradient id="apple-gradient" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#5E5CE6"/>
                    <stop offset="50%" stop-color="#7B61FF"/>
                    <stop offset="100%" stop-color="#64D2FF"/>
                </linearGradient>
            </defs>
        </svg>
    </div>
    <h2>AI工时管理</h2>
    <p class="subtitle">登录以继续使用，支持多端同步</p>
    <form id="login-form">
        <div class="form-group" style="margin-bottom:14px;">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
        </div>
        <div class="form-group" style="margin-bottom:14px;">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">登 录</button>
    </form>
    <p style="text-align:center;margin-top:18px;font-size:12px;color:var(--text-tertiary);">
        测试账号：admin / admin123
    </p>
</div>
{% endblock %}
{% block extra_script %}
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = e.target.querySelector('button');
    btn.textContent = '登录中...'; btn.disabled = true;
    try {
        var res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });
        var data = await res.json();
        if (res.ok) {
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('user', JSON.stringify(data.user));
            showToast('登录成功，欢迎 ' + data.user.real_name, 'success');
            setTimeout(function() { window.location.href = '/dashboard'; }, 500);
        } else {
            showToast(data.detail || '登录失败', 'error');
        }
    } catch (err) {
        showToast('网络错误，请重试', 'error');
    }
    btn.textContent = '登 录'; btn.disabled = false;
});
</script>
{% endblock %}
